services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mlops:
        condition: service_started
    volumes:
      - ./backend:/app

  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "11434:8000"
    volumes:
      - ${HF_CACHE_DIR:-/home/ubuntu/.cache/huggingface}:/root/.cache/huggingface
      - ${VLLM_CACHE_DIR:-/home/ubuntu/.cache/vllm}:/root/.cache/vllm
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - PYTORCH_ALLOC_CONF=expandable_segments:True
    command:
      - --model
      - ${LLM_MODEL:-Qwen/Qwen3-32B-AWQ}
      - --max-model-len
      - "16384"
      - --gpu-memory-utilization
      - "0.98"
      - --max-num-seqs
      - "1"
      - --kv-cache-dtype
      - fp8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 600s
    restart: unless-stopped

  mlops:
    build:
      context: ./mlops
      dockerfile: Dockerfile
    ports:
      - "${MLOPS_PORT}:8001"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      vllm:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./mlops:/app
      - hf_cache:/app/.cache

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  test-api1:
    build:
      context: ./test-api1
      dockerfile: Dockerfile
    ports:
      - "9000:9000"

volumes:
  pgdata:
  hf_cache:
