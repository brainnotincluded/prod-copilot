  <line x1="85" y1="255" x2="740" y2="255" stroke="#222" stroke-width="1"/>
  <line x1="85" y1="305" x2="740" y2="305" stroke="#222" stroke-width="1"/>
  <line x1="85" y1="355" x2="740" y2="355" stroke="#222" stroke-width="1"/>
  <line x1="85" y1="405" x2="740" y2="405" stroke="#222" stroke-width="1"/>
  <line x1="85" y1="455" x2="740" y2="455" stroke="#222" stroke-width="1"/>
  <line x1="85" y1="505" x2="740" y2="505" stroke="#222" stroke-width="1"/>

  <!-- Bar group 1: Реактивация Премиум -->
  <rect x="120" y="265" width="55" height="240" rx="3" fill="url(#bar1)" opacity="0.9"/>
  <rect x="180" y="355" width="55" height="150" rx="3" fill="url(#bar2)" opacity="0.9"/>
  <text x="177" y="520" fill="#aaa" font-size="10" text-anchor="middle">Реактивация</text>
  <text x="177" y="532" fill="#aaa" font-size="10" text-anchor="middle">Премиум</text>

  <!-- Bar group 2: Весенняя акция -->
  <rect x="290" y="305" width="55" height="200" rx="3" fill="url(#bar1)" opacity="0.9"/>
  <rect x="350" y="375" width="55" height="130" rx="3" fill="url(#bar2)" opacity="0.9"/>
  <text x="347" y="520" fill="#aaa" font-size="10" text-anchor="middle">Весенняя</text>
  <text x="347" y="532" fill="#aaa" font-size="10" text-anchor="middle">акция</text>

  <!-- Bar group 3: Welcome серия -->
  <rect x="460" y="385" width="55" height="120" rx="3" fill="url(#bar1)" opacity="0.9"/>
  <rect x="520" y="425" width="55" height="80" rx="3" fill="url(#bar2)" opacity="0.9"/>
  <text x="517" y="520" fill="#aaa" font-size="10" text-anchor="middle">Welcome</text>
  <text x="517" y="532" fill="#aaa" font-size="10" text-anchor="middle">серия</text>

  <!-- Legend -->
  <rect x="600" y="248" width="12" height="12" rx="2" fill="#C6FF00"/>
  <text x="618" y="259" fill="#ccc" font-size="11">Отправлено</text>
  <rect x="600" y="268" width="12" height="12" rx="2" fill="#ffcc44"/>
  <text x="618" y="279" fill="#ccc" font-size="11">Открыто</text>

