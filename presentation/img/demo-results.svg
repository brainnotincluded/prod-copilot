<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C6FF00"/>
      <stop offset="100%" stop-color="#8BB800"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#cc9900"/>
    </linearGradient>
    <linearGradient id="cardgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#080808"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="50" fill="#0c0c0c"/>
  <rect x="0" y="49" width="1200" height="1" fill="#333"/>
  <text x="30" y="32" fill="#C6FF00" font-size="14" font-weight="900" letter-spacing="2">PROD COPILOT</text>
  <text x="200" y="32" fill="#888" font-size="13">Результаты запроса: "Покажи KPI по кампаниям за март"</text>

  <!-- KPI Cards Row -->
  <rect x="30" y="70" width="270" height="90" rx="6" fill="url(#cardgrad)" stroke="#333" stroke-width="1"/>
  <rect x="30" y="70" width="270" height="3" rx="1" fill="#C6FF00"/>
  <text x="50" y="105" fill="#C6FF00" font-size="32" font-weight="900" font-family="Monument Extended, sans-serif">24 580</text>
  <text x="50" y="140" fill="#888" font-size="13" letter-spacing="1">ВСЕГО ОТПРАВЛЕНО</text>

  <rect x="320" y="70" width="270" height="90" rx="6" fill="url(#cardgrad)" stroke="#333" stroke-width="1"/>
  <rect x="320" y="70" width="270" height="3" rx="1" fill="#C6FF00"/>
  <text x="340" y="105" fill="#C6FF00" font-size="32" font-weight="900" font-family="Monument Extended, sans-serif">18.7%</text>
  <text x="340" y="140" fill="#888" font-size="13" letter-spacing="1">OPEN RATE</text>

  <rect x="610" y="70" width="270" height="90" rx="6" fill="url(#cardgrad)" stroke="#333" stroke-width="1"/>
  <rect x="610" y="70" width="270" height="3" rx="1" fill="#C6FF00"/>
  <text x="630" y="105" fill="#C6FF00" font-size="32" font-weight="900" font-family="Monument Extended, sans-serif">4.2%</text>
  <text x="630" y="140" fill="#888" font-size="13" letter-spacing="1">CTR</text>

  <rect x="900" y="70" width="270" height="90" rx="6" fill="url(#cardgrad)" stroke="#333" stroke-width="1"/>
  <rect x="900" y="70" width="270" height="3" rx="1" fill="#ffaa00"/>
  <text x="920" y="105" fill="#ffcc44" font-size="32" font-weight="900" font-family="Monument Extended, sans-serif">3</text>
  <text x="920" y="140" fill="#888" font-size="13" letter-spacing="1">АКТИВНЫЕ КАМПАНИИ</text>

  <!-- Chart area -->
  <rect x="30" y="180" width="730" height="350" rx="6" fill="#0c0c0c" stroke="#333" stroke-width="1"/>
  <text x="50" y="210" fill="#e0e0e0" font-size="14" font-weight="700">Эффективность кампаний - Март 2026</text>
  <text x="50" y="230" fill="#666" font-size="11">Показатели по каждой кампании</text>

  <!-- Y-axis labels -->
  <text x="75" y="260" fill="#666" font-size="10" text-anchor="end">25k</text>
  <text x="75" y="310" fill="#666" font-size="10" text-anchor="end">20k</text>
  <text x="75" y="360" fill="#666" font-size="10" text-anchor="end">15k</text>
  <text x="75" y="410" fill="#666" font-size="10" text-anchor="end">10k</text>
  <text x="75" y="460" fill="#666" font-size="10" text-anchor="end">5k</text>
  <text x="75" y="510" fill="#666" font-size="10" text-anchor="end">0</text>

