  <rect x="790" y="225" width="370" height="30" fill="#161616"/>
  <text x="805" y="245" fill="#C6FF00" font-size="11" font-weight="700">Кампания</text>
  <text x="950" y="245" fill="#C6FF00" font-size="11" font-weight="700">Sent</text>
  <text x="1010" y="245" fill="#C6FF00" font-size="11" font-weight="700">Open%</text>
  <text x="1080" y="245" fill="#C6FF00" font-size="11" font-weight="700">CTR%</text>

  <!-- Row 1 -->
  <rect x="790" y="257" width="370" height="28" fill="#0f0f0f"/>
  <text x="805" y="276" fill="#e0e0e0" font-size="12">Реактивация Премиум</text>
  <text x="950" y="276" fill="#e0e0e0" font-size="12">12 400</text>
  <text x="1010" y="276" fill="#C6FF00" font-size="12">21.3%</text>
  <text x="1080" y="276" fill="#C6FF00" font-size="12">5.1%</text>

  <!-- Row 2 -->
  <rect x="790" y="287" width="370" height="28" fill="#111"/>
  <text x="805" y="306" fill="#e0e0e0" font-size="12">Весенняя акция</text>
  <text x="950" y="306" fill="#e0e0e0" font-size="12">8 200</text>
  <text x="1010" y="306" fill="#e0e0e0" font-size="12">17.8%</text>
  <text x="1080" y="306" fill="#e0e0e0" font-size="12">4.0%</text>

  <!-- Row 3 -->
  <rect x="790" y="317" width="370" height="28" fill="#0f0f0f"/>
  <text x="805" y="336" fill="#e0e0e0" font-size="12">Welcome серия</text>
  <text x="950" y="336" fill="#e0e0e0" font-size="12">3 980</text>
  <text x="1010" y="336" fill="#e0e0e0" font-size="12">14.2%</text>
  <text x="1080" y="336" fill="#e0e0e0" font-size="12">3.1%</text>

  <!-- Row separator -->
  <line x1="790" y1="355" x2="1160" y2="355" stroke="#333" stroke-width="1"/>

  <!-- Summary row -->
  <rect x="790" y="357" width="370" height="28" fill="rgba(198,255,0,0.05)"/>
  <text x="805" y="376" fill="#C6FF00" font-size="12" font-weight="700">Итого</text>
  <text x="950" y="376" fill="#C6FF00" font-size="12" font-weight="700">24 580</text>
  <text x="1010" y="376" fill="#C6FF00" font-size="12" font-weight="700">18.7%</text>
  <text x="1080" y="376" fill="#C6FF00" font-size="12" font-weight="700">4.2%</text>

  <!-- Reasoning box -->
  <rect x="790" y="405" width="370" height="115" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="790" y="405" width="3" height="115" rx="1" fill="#ffaa00"/>
  <text x="810" y="425" fill="#ffcc44" font-size="11" font-weight="700">Reasoning</text>
  <text x="810" y="445" fill="#aaa" font-size="11">Кампания "Реактивация Премиум"</text>
  <text x="810" y="462" fill="#aaa" font-size="11">показывает лучший Open Rate</text>
  <text x="810" y="479" fill="#aaa" font-size="11">(21.3%) и CTR (5.1%). Рекомендую</text>
  <text x="810" y="496" fill="#aaa" font-size="11">масштабировать этот сегмент.</text>

  <!-- Bottom: Steps timeline -->
  <rect x="30" y="545" width="1140" height="55" rx="6" fill="#0c0c0c" stroke="#333" stroke-width="1"/>
  <text x="50" y="570" fill="#888" font-size="11" font-weight="700">ШАГИ:</text>

  <rect x="110" y="555" width="150" height="28" rx="4" fill="rgba(198,255,0,0.08)"/>
  <circle cx="125" cy="569" r="6" fill="#C6FF00"/>
  <text x="122" y="573" fill="#000" font-size="8" font-weight="900" text-anchor="middle">1</text>
  <text x="138" y="573" fill="#ccc" font-size="11">search endpoints</text>

  <text x="270" y="573" fill="#444" font-size="14">-&gt;</text>

  <rect x="290" y="555" width="180" height="28" rx="4" fill="rgba(198,255,0,0.08)"/>
  <circle cx="305" cy="569" r="6" fill="#C6FF00"/>
  <text x="302" y="573" fill="#000" font-size="8" font-weight="900" text-anchor="middle">2</text>
  <text x="318" y="573" fill="#ccc" font-size="11">api_call GET /campaigns</text>

  <text x="480" y="573" fill="#444" font-size="14">-&gt;</text>

  <rect x="500" y="555" width="180" height="28" rx="4" fill="rgba(198,255,0,0.08)"/>
  <circle cx="515" cy="569" r="6" fill="#C6FF00"/>
  <text x="512" y="573" fill="#000" font-size="8" font-weight="900" text-anchor="middle">3</text>
  <text x="528" y="573" fill="#ccc" font-size="11">api_call GET /analytics</text>

  <text x="690" y="573" fill="#444" font-size="14">-&gt;</text>

  <rect x="710" y="555" width="150" height="28" rx="4" fill="rgba(198,255,0,0.08)"/>
  <circle cx="725" cy="569" r="6" fill="#C6FF00"/>
  <text x="722" y="573" fill="#000" font-size="8" font-weight="900" text-anchor="middle">4</text>
  <text x="738" y="573" fill="#ccc" font-size="11">data_process</text>

  <text x="870" y="573" fill="#444" font-size="14">-&gt;</text>

  <rect x="890" y="555" width="150" height="28" rx="4" fill="rgba(198,255,0,0.08)" stroke="#C6FF00" stroke-width="0.5"/>
  <circle cx="905" cy="569" r="6" fill="#C6FF00"/>
  <text x="902" y="573" fill="#000" font-size="8" font-weight="900" text-anchor="middle">5</text>
  <text x="918" y="573" fill="#ccc" font-size="11">format_output</text>

  <!-- Footer -->
  <rect x="0" y="615" width="1200" height="85" fill="#080808"/>
  <rect x="0" y="614" width="1200" height="1" fill="#222"/>
  <text x="30" y="650" fill="#444" font-size="11">Prod Copilot v1.0 | Marketing API Demo</text>
  <text x="30" y="670" fill="#333" font-size="10">Время выполнения: 2.3 сек | 5 шагов | LLM: Kimi K2 | Mode: plan-execute</text>
</svg>
