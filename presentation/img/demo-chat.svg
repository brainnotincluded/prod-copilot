<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="sidebar-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="accent-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C6FF00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C6FF00" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#080808"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="260" height="700" fill="url(#sidebar-bg)"/>
  <rect x="259" y="0" width="1" height="700" fill="#333"/>

  <!-- Sidebar logo area -->
  <rect x="20" y="20" width="220" height="50" rx="6" fill="#161616" stroke="#333" stroke-width="1"/>
  <text x="40" y="52" fill="#C6FF00" font-size="16" font-weight="900" letter-spacing="2">PROD COPILOT</text>

  <!-- Sidebar menu items -->
  <rect x="15" y="90" width="230" height="40" rx="4" fill="rgba(198,255,0,0.08)" stroke="#C6FF00" stroke-width="1"/>
  <circle cx="35" cy="110" r="8" fill="none" stroke="#C6FF00" stroke-width="1.5"/>
  <text x="52" y="115" fill="#C6FF00" font-size="13" font-weight="700">Chat</text>

  <rect x="15" y="140" width="230" height="40" rx="4" fill="transparent" stroke="#333" stroke-width="1"/>
  <circle cx="35" cy="160" r="8" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="52" y="165" fill="#888" font-size="13">API Maps</text>

  <rect x="15" y="190" width="230" height="40" rx="4" fill="transparent" stroke="#333" stroke-width="1"/>
  <circle cx="35" cy="210" r="8" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="52" y="215" fill="#888" font-size="13">Swagger Sources</text>

  <rect x="15" y="240" width="230" height="40" rx="4" fill="transparent" stroke="#333" stroke-width="1"/>
  <circle cx="35" cy="260" r="8" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="52" y="265" fill="#888" font-size="13">Endpoints</text>

  <!-- Swagger source selector -->
  <text x="20" y="320" fill="#666" font-size="11" letter-spacing="1">SWAGGER SOURCES</text>
  <rect x="15" y="335" width="230" height="32" rx="4" fill="#161616" stroke="#C6FF00" stroke-width="1"/>
  <text x="30" y="356" fill="#ccc" font-size="12">Marketing API v2.1</text>
  <rect x="15" y="375" width="230" height="32" rx="4" fill="#161616" stroke="#333" stroke-width="1"/>
  <text x="30" y="396" fill="#888" font-size="12">Analytics API v1.0</text>

  <!-- Main chat area -->
  <!-- Header -->
  <rect x="260" y="0" width="940" height="55" fill="#0c0c0c"/>
  <rect x="260" y="54" width="940" height="1" fill="#333"/>
  <text x="290" y="35" fill="#e0e0e0" font-size="16" font-weight="700">Marketing API - Chat</text>
  <rect x="1100" y="15" width="80" height="26" rx="4" fill="#161616" stroke="#333" stroke-width="1"/>
  <text x="1115" y="33" fill="#888" font-size="11">Kimi K2</text>

  <!-- User message -->
  <rect x="290" y="80" width="880" height="70" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <rect x="290" y="80" width="3" height="70" rx="1" fill="#666"/>
  <text x="310" y="105" fill="#aaa" font-size="11">Пользователь</text>
  <text x="310" y="130" fill="#e0e0e0" font-size="15" font-weight="500">Покажи все сегменты</text>

  <!-- Steps timeline -->
  <rect x="290" y="170" width="880" height="140" rx="6" fill="#0c1a0c" stroke="#C6FF00" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="290" y="170" width="3" height="140" rx="1" fill="#C6FF00"/>
  <text x="310" y="195" fill="#C6FF00" font-size="11" font-weight="700">Copilot - Выполнение плана</text>

  <!-- Step 1 -->
  <rect x="310" y="210" width="250" height="28" rx="4" fill="rgba(198,255,0,0.08)" stroke="#C6FF00" stroke-width="0.5"/>
  <circle cx="325" cy="224" r="6" fill="#C6FF00"/>
  <text x="322" y="228" fill="#000" font-size="9" font-weight="900" text-anchor="middle">1</text>
  <text x="340" y="228" fill="#ccc" font-size="12">search - поиск эндпоинтов</text>
  <text x="540" y="228" fill="#C6FF00" font-size="10" font-weight="700">OK</text>

  <!-- Step 2 -->
  <rect x="310" y="245" width="250" height="28" rx="4" fill="rgba(198,255,0,0.08)" stroke="#C6FF00" stroke-width="0.5"/>
  <circle cx="325" cy="259" r="6" fill="#C6FF00"/>
  <text x="322" y="263" fill="#000" font-size="9" font-weight="900" text-anchor="middle">2</text>
  <text x="340" y="263" fill="#ccc" font-size="12">api_call - GET /segments</text>
  <text x="540" y="263" fill="#C6FF00" font-size="10" font-weight="700">OK</text>

  <!-- Step 3 -->
  <rect x="310" y="280" width="250" height="28" rx="4" fill="rgba(198,255,0,0.08)" stroke="#C6FF00" stroke-width="0.5"/>
  <circle cx="325" cy="294" r="6" fill="#C6FF00"/>
  <text x="322" y="298" fill="#000" font-size="9" font-weight="900" text-anchor="middle">3</text>
  <text x="340" y="298" fill="#ccc" font-size="12">format_output - таблица</text>
  <text x="540" y="298" fill="#C6FF00" font-size="10" font-weight="700">OK</text>

  <!-- Bot response with table -->
  <rect x="290" y="330" width="880" height="340" rx="6" fill="#0c1a0c" stroke="#C6FF00" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="290" y="330" width="3" height="340" rx="1" fill="#C6FF00"/>
  <text x="310" y="355" fill="#C6FF00" font-size="11" font-weight="700">Copilot - Результат</text>
  <text x="310" y="380" fill="#ccc" font-size="14">Найдено 5 сегментов в Marketing API:</text>

  <!-- Table header -->
  <rect x="310" y="395" width="840" height="35" rx="0" fill="#161616"/>
  <line x1="310" y1="430" x2="1150" y2="430" stroke="#444" stroke-width="1"/>
  <text x="330" y="418" fill="#C6FF00" font-size="12" font-weight="700">ID</text>
  <text x="400" y="418" fill="#C6FF00" font-size="12" font-weight="700">Название</text>
  <text x="650" y="418" fill="#C6FF00" font-size="12" font-weight="700">Размер</text>
  <text x="780" y="418" fill="#C6FF00" font-size="12" font-weight="700">Статус</text>
  <text x="920" y="418" fill="#C6FF00" font-size="12" font-weight="700">Обновлён</text>

  <!-- Table rows -->
  <rect x="310" y="432" width="840" height="32" fill="#0f0f0f"/>
  <text x="330" y="453" fill="#e0e0e0" font-size="12">1</text>
  <text x="400" y="453" fill="#e0e0e0" font-size="12">Премиум-клиенты</text>
  <text x="650" y="453" fill="#e0e0e0" font-size="12">8 420</text>
  <rect x="780" y="440" width="60" height="20" rx="3" fill="rgba(198,255,0,0.15)" stroke="#C6FF00" stroke-width="0.5"/>
  <text x="795" y="454" fill="#C6FF00" font-size="11">active</text>
  <text x="920" y="453" fill="#888" font-size="12">2026-03-15</text>

  <line x1="310" y1="465" x2="1150" y2="465" stroke="#222" stroke-width="1"/>
  <rect x="310" y="466" width="840" height="32" fill="#111"/>
  <text x="330" y="487" fill="#e0e0e0" font-size="12">2</text>
  <text x="400" y="487" fill="#e0e0e0" font-size="12">Неактивные 60+ дней</text>
  <text x="650" y="487" fill="#e0e0e0" font-size="12">6 190</text>
  <rect x="780" y="474" width="60" height="20" rx="3" fill="rgba(198,255,0,0.15)" stroke="#C6FF00" stroke-width="0.5"/>
  <text x="795" y="488" fill="#C6FF00" font-size="11">active</text>
  <text x="920" y="487" fill="#888" font-size="12">2026-03-14</text>

  <line x1="310" y1="499" x2="1150" y2="499" stroke="#222" stroke-width="1"/>
  <rect x="310" y="500" width="840" height="32" fill="#0f0f0f"/>
  <text x="330" y="521" fill="#e0e0e0" font-size="12">3</text>
  <text x="400" y="521" fill="#e0e0e0" font-size="12">Высокий средний чек</text>
  <text x="650" y="521" fill="#e0e0e0" font-size="12">4 750</text>
  <rect x="780" y="508" width="60" height="20" rx="3" fill="rgba(198,255,0,0.15)" stroke="#C6FF00" stroke-width="0.5"/>
  <text x="795" y="522" fill="#C6FF00" font-size="11">active</text>
  <text x="920" y="521" fill="#888" font-size="12">2026-03-12</text>

  <line x1="310" y1="533" x2="1150" y2="533" stroke="#222" stroke-width="1"/>
  <rect x="310" y="534" width="840" height="32" fill="#111"/>
  <text x="330" y="555" fill="#e0e0e0" font-size="12">4</text>
  <text x="400" y="555" fill="#e0e0e0" font-size="12">Новые пользователи (7 дн.)</text>
  <text x="650" y="555" fill="#e0e0e0" font-size="12">1 230</text>
  <rect x="780" y="542" width="60" height="20" rx="3" fill="rgba(255,170,0,0.15)" stroke="#ffaa00" stroke-width="0.5"/>
  <text x="793" y="556" fill="#ffaa00" font-size="11">draft</text>
  <text x="920" y="555" fill="#888" font-size="12">2026-03-10</text>

  <line x1="310" y1="567" x2="1150" y2="567" stroke="#222" stroke-width="1"/>
  <rect x="310" y="568" width="840" height="32" fill="#0f0f0f"/>
  <text x="330" y="589" fill="#e0e0e0" font-size="12">5</text>
  <text x="400" y="589" fill="#e0e0e0" font-size="12">Отписавшиеся от рассылки</text>
  <text x="650" y="589" fill="#e0e0e0" font-size="12">2 890</text>
  <rect x="780" y="576" width="70" height="20" rx="3" fill="rgba(255,85,85,0.15)" stroke="#ff5555" stroke-width="0.5"/>
  <text x="791" y="590" fill="#ff5555" font-size="11">archived</text>
  <text x="920" y="589" fill="#888" font-size="12">2026-02-28</text>

  <!-- Input area -->
  <rect x="260" y="655" width="940" height="45" fill="#0c0c0c"/>
  <rect x="260" y="654" width="940" height="1" fill="#333"/>
  <rect x="290" y="663" width="850" height="30" rx="6" fill="#161616" stroke="#333" stroke-width="1"/>
  <text x="310" y="683" fill="#555" font-size="13">Введите сообщение...</text>
  <rect x="1150" y="663" width="30" height="30" rx="6" fill="#C6FF00"/>
  <text x="1160" y="683" fill="#000" font-size="14" font-weight="900">-&gt;</text>
</svg>
